services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: vadycrank/devops-for-developers-project-74
    env_file: .env
    command: make test
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5